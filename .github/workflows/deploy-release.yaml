name: Build and deploy MkDocs to release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source branch
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build MkDocs site
        run: |
          mkdocs build -d site
          touch site/.nojekyll

      - name: Pack built site
        run: |
          tar -C site -czf site.tar.gz .

      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-site
          path: site.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository with deploy token
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAGES_DEPLOY_PAT }}

      - name: Download built site artifact
        uses: actions/download-artifact@v5
        with:
          name: built-site
          path: ${{ runner.temp }}

      - name: Publish site to release branch
        run: |
          mkdir -p "${{ runner.temp }}/site"
          tar -xzf "${{ runner.temp }}/site.tar.gz" -C "${{ runner.temp }}/site"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan release-deploy
          git rm -rf . >/dev/null 2>&1 || true
          git clean -fdx

          cp -r "${{ runner.temp }}/site/." .

          git add .
          git commit -m "Deploy site from ${GITHUB_SHA}"
          git push origin HEAD:release --force